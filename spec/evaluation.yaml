evaluation_plan:
  accuracy_checks:
    - verify_citations_against_sources
    - confirm_statutory_references
  drafting_quality_checks:
    - clarity_and_structure
    - enforceability_language
    - internal_consistency
  jurisdictional_compliance:
    - Bangladesh_specific_terms
    - regulatory_alignment
  expert_review:
    required: true
    reviewer_roles:
      - licensed_bangladesh_lawyer
      - practice_area_specialist
metrics:
  - citation_accuracy_rate
  - reviewer_defect_rate
  - template_reuse_success_rate
